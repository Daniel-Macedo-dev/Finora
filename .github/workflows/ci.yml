name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (tests + verify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      # Integration tests use Testcontainers; Docker is available on the runner.
      - name: Run backend verification
        working-directory: apps/api
        run: ./mvnw -B verify

  frontend:
    name: Frontend (lint + typecheck + tests + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        working-directory: apps/web
        run: npm ci
      - name: Lint
        working-directory: apps/web
        run: npm run lint
      - name: Typecheck
        working-directory: apps/web
        run: npm run typecheck
      - name: Unit tests
        working-directory: apps/web
        run: npm run test
      - name: Production build
        working-directory: apps/web
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:16.6-alpine
        env:
          POSTGRES_DB: finora
          POSTGRES_USER: finora
          POSTGRES_PASSWORD: finora_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U finora -d finora"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Start API
        working-directory: apps/api
        run: |
          ./mvnw -B spring-boot:run > api.log 2>&1 &
          echo $! > api.pid
      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci
      - name: Install Playwright browser
        working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - name: Wait for API
        run: |
          # /api/auth/csrf is public (returns 204); protected routes now answer 401.
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://localhost:8080/api/auth/csrf; then
              echo "API is up" && exit 0
            fi
            sleep 2
          done
          echo "API did not start in time" && cat apps/api/api.log && exit 1
      - name: Run E2E suite
        working-directory: apps/web
        run: npm run e2e
      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: apps/web/test-results
          retention-days: 7
