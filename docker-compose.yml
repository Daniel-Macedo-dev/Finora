services:
  postgres:
    image: postgres:16.6-alpine
    container_name: finora-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finora}
      POSTGRES_USER: ${POSTGRES_USER:-finora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finora_dev}
    ports:
      # 5433 by default to avoid clashing with a locally installed PostgreSQL.
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - finora-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finora} -d ${POSTGRES_DB:-finora}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  finora-pgdata:
