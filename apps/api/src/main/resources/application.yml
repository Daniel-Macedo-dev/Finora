spring:
  application:
    name: finora-api
  datasource:
    url: ${FINORA_DB_URL:jdbc:postgresql://localhost:5433/finora}
    username: ${FINORA_DB_USER:finora}
    password: ${FINORA_DB_PASSWORD:finora_dev}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      # Statement uploads are hard-bounded (see StatementLimits): the request
      # is rejected by the container before the application buffers more.
      max-file-size: 5MB
      max-request-size: 6MB
  session:
    jdbc:
      # Flyway owns the SPRING_SESSION schema (V5); never auto-initialize.
      initialize-schema: never
    timeout: ${FINORA_SESSION_TIMEOUT:12h}

server:
  port: ${FINORA_API_PORT:8080}
  servlet:
    session:
      cookie:
        name: FINORA_SESSION
        http-only: true
        same-site: lax
        secure: ${FINORA_COOKIE_SECURE:false}
        path: /

finora:
  cors:
    allowed-origins: ${FINORA_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  security:
    # Adaptive one-way hashing: BCrypt. Tests lower the cost for speed.
    bcrypt-strength: ${FINORA_BCRYPT_STRENGTH:10}
  legacy-claim:
    # One-time secret that enables claiming pre-multiuser data. Empty = disabled.
    token: ${FINORA_LEGACY_CLAIM_TOKEN:}
  notifications:
    auto-sync:
      enabled: ${FINORA_NOTIFICATIONS_AUTO_SYNC_ENABLED:true}
    initial-delay: ${FINORA_NOTIFICATIONS_INITIAL_DELAY:PT1M}
    sync-interval: ${FINORA_NOTIFICATIONS_SYNC_INTERVAL:PT15M}
    user-batch-size: ${FINORA_NOTIFICATIONS_USER_BATCH_SIZE:100}
